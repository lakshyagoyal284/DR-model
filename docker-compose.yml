version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/saved_models:/app/saved_models
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dr_user
      POSTGRES_PASSWORD: dr_pass
      POSTGRES_DB: dr_detection
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
